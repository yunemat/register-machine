<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-light">

<div class="container py-5" style="max-width: 600px;">

  <h3 class="text-center mb-4">Register</h3>

  <form id="registerForm" class="card p-4 shadow-sm">

    <!-- Ad Soyad -->
    <div class="mb-3">
      <label class="form-label">Ad Soyad *</label>
      <input type="text" id="fullname" class="form-control" required>
    </div>

    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">Email *</label>
      <input type="email" id="email" class="form-control" required>
    </div>

    <!-- Extra -->
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="extraInfo">
      <label class="form-check-label">Ek bilgi vermek istiyorum</label>
    </div>

    <div id="extraFields" style="display:none;">

      <div class="mb-3">
        <input class="form-control" id="company" placeholder="Şirket">
      </div>

      <div class="mb-3">
        <input class="form-control" id="sector" placeholder="Sektör">
      </div>

      <div class="mb-3">
        <input class="form-control" id="job_title" placeholder="Görev">
      </div>

      <div class="mb-3">
        <input class="form-control" id="phone" placeholder="Telefon">
      </div>

    </div>

    <button class="btn btn-primary w-100" type="submit">
      Tamam
    </button>

    <p id="message" class="text-center mt-3"></p>

  </form>

</div>

<script>
  // ===== SUPABASE BAĞLANTI =====
  const SUPABASE_URL = "https://hulrbtowgzmwiohevzby.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_3eVdrKhgiziR_NzxiK3Bpg_puNfoT-f";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ===== ELEMENTLER =====
  const form = document.getElementById("registerForm");
  const message = document.getElementById("message");

  const extraInfo = document.getElementById("extraInfo");
  const extraFields = document.getElementById("extraFields");

  // checkbox kontrol
  extraInfo.addEventListener("change", () => {
    extraFields.style.display = extraInfo.checked ? "block" : "none";
  });

  // form submit
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    message.innerText = "Kaydediliyor...";

    const fullname = document.getElementById("fullname").value;
    const email = document.getElementById("email").value;
    const company = document.getElementById("company").value;
    const sector = document.getElementById("sector").value;
    const job_title = document.getElementById("job_title").value;
    const phone = document.getElementById("phone").value;

    // 1. registrations ekle
    const { data: reg, error: regError } = await client
      .from("registrations")
      .insert([
        {
          fullname,
          email,
          company,
          sector,
          job_title,
          phone
        }
      ])
      .select()
      .single();

    if (regError) {
      message.innerText = "Hata: " + regError.message;
      return;
    }

    // 2. jobs ekle
    const { error: jobError } = await client
      .from("jobs")
      .insert([
        {
          registration_id: reg.id,
          status: "waiting"
        }
      ]);

    if (jobError) {
      message.innerText = "Job Hatası: " + jobError.message;
      return;
    }

    message.innerText = "Kayıt başarılı!";

    form.reset();
    extraFields.style.display = "none";
  });
</script>

</body>
</html>
