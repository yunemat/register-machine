<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-light">

<div class="container py-5" style="max-width: 600px;">

  <!-- FORM -->
  <div id="formBox">
    <h3 class="text-center mb-4">Register V2</h3>

    <form id="registerForm" class="card p-4 shadow-sm">

      <div class="mb-3">
        <label class="form-label">Ad Soyad *</label>
        <input type="text" id="fullname" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email *</label>
        <input type="email" id="email" class="form-control" required>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="extraInfo">
        <label class="form-check-label">Ek bilgi</label>
      </div>

      <div id="extraFields" style="display:none;">

        <div class="mb-2">
          <input class="form-control" id="company" placeholder="Şirket">
        </div>

        <div class="mb-2">
          <input class="form-control" id="sector" placeholder="Sektör">
        </div>

        <div class="mb-2">
          <input class="form-control" id="job_title" placeholder="Görev">
        </div>

        <div class="mb-2">
          <input class="form-control" id="phone" placeholder="Telefon">
        </div>

      </div>

      <button class="btn btn-primary w-100 mt-3" type="submit">
        Tamam
      </button>

    </form>
  </div>

  <!-- LOADING -->
  <div id="loadingBox" style="display:none; text-align:center;">
    <h4>İşleniyor...</h4>
    <p>Maestro 80 çalışıyor</p>

    <img src="maestro-80.gif" width="200">
  </div>

  <!-- DONE -->
  <div id="doneBox" style="display:none; text-align:center;">
    <h4>İşlem Tamamlandı</h4>

    <img src="https://media.giphy.com/media/111ebonMs90YLu/giphy.gif" width="200">
  </div>

</div>

<script>
  // ================= SUPABASE =================
  const SUPABASE_URL = "https://hulrbtowgzmwiohevzby.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_3eVdrKhgiziR_NzxiK3Bpg_puNfoT-f";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ================= ELEMENTLER =================
  const form = document.getElementById("registerForm");
  const extraInfo = document.getElementById("extraInfo");
  const extraFields = document.getElementById("extraFields");

  const formBox = document.getElementById("formBox");
  const loadingBox = document.getElementById("loadingBox");
  const doneBox = document.getElementById("doneBox");

  let currentJobId = null;
  let interval = null;

  // extra alan
  extraInfo.addEventListener("change", () => {
    extraFields.style.display = extraInfo.checked ? "block" : "none";
  });

  // FORM SUBMIT
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    formBox.style.display = "none";
    loadingBox.style.display = "block";

    const fullname = document.getElementById("fullname").value;
    const email = document.getElementById("email").value;
    const company = document.getElementById("company").value;
    const sector = document.getElementById("sector").value;
    const job_title = document.getElementById("job_title").value;
    const phone = document.getElementById("phone").value;

    // 1. registrations
    const { data: reg, error } = await client
      .from("registrations")
      .insert([{
        fullname,
        email,
        company,
        sector,
        job_title,
        phone
      }])
      .select()
      .single();

    if (error) {
      alert(error.message);
      return;
    }

    // 2. job create
    const { data: job } = await client
      .from("jobs")
      .insert([{
        registration_id: reg.id,
        status: "waiting"
      }])
      .select()
      .single();

    currentJobId = job.id;

    // polling başlat
    interval = setInterval(checkJobStatus, 2000);
  });

  // ================= JOB CHECK =================
  async function checkJobStatus() {

    const { data } = await client
      .from("jobs")
      .select("*")
      .eq("id", currentJobId)
      .single();

    if (!data) return;

    if (data.status === "completed") {

      clearInterval(interval);

      loadingBox.style.display = "none";
      doneBox.style.display = "block";
    }
  }
</script>

</body>
</html>
