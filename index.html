<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container py-5" style="max-width: 600px;">

  <h3 class="mb-4 text-center">Register</h3>

  <form id="registerForm" class="card p-4 shadow-sm">

    <!-- Ad Soyad -->
    <div class="mb-3">
      <label class="form-label">Ad Soyad *</label>
      <input type="text" class="form-control" id="fullname" required>
    </div>

    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">Email *</label>
      <input type="email" class="form-control" id="email" required>
    </div>

    <!-- Extra info checkbox -->
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="extraInfo">
      <label class="form-check-label">
        Ek bilgi vermek istiyorum
      </label>
    </div>

    <!-- Extra fields -->
    <div id="extraFields" style="display:none;">

      <div class="mb-3">
        <label class="form-label">Şirket</label>
        <input type="text" class="form-control" id="company">
      </div>

      <div class="mb-3">
        <label class="form-label">Sektör</label>
        <input type="text" class="form-control" id="sector">
      </div>

      <div class="mb-3">
        <label class="form-label">Görev</label>
        <input type="text" class="form-control" id="job_title">
      </div>

      <div class="mb-3">
        <label class="form-label">Cep Telefonu</label>
        <input type="text" class="form-control" id="phone">
      </div>

    </div>

    <button type="submit" class="btn btn-primary w-100">
      Tamam
    </button>

    <p id="message" class="mt-3 text-center"></p>

  </form>
</div>

<script>
  const extraInfo = document.getElementById("extraInfo");
  const extraFields = document.getElementById("extraFields");

  extraInfo.addEventListener("change", () => {
    extraFields.style.display = extraInfo.checked ? "block" : "none";
  });
</script>

</body>
</html>
